<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江底微光 - 版本A</title>
<style>
  * { margin:0; padding:0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; }

  .slide { width: 100vw; height: 100vh; position: relative; overflow: hidden; }

  #slide1 { background: linear-gradient(180deg, #0a1628 0%, #0d2137 30%, #0a1e3d 60%, #061020 100%); }
  #slide2 { background: linear-gradient(180deg, #061020 0%, #0a1e3d 40%, #0d2137 70%, #0a1628 100%); }
  #slide3 { background: linear-gradient(180deg, #0a1628 0%, #0d2540 35%, #0a1e3d 65%, #061020 100%); }
  #slide4 { background: linear-gradient(180deg, #061020 0%, #0a1e3d 50%, #0d2137 80%, #0a1628 100%); }
  #slide5, #slide6, #slide7, #slide8, #slide9,
  #slide10, #slide11, #slide12, #slide13, #slide14 { background: #000; }

  .water-ripple {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse 120% 20% at 50% 0%, rgba(30,100,180,0.15) 0%, transparent 70%);
    animation: ripple 4s ease-in-out infinite;
  }
  @keyframes ripple { 0%,100% { opacity: 0.6; transform: scaleY(1); } 50% { opacity: 1; transform: scaleY(1.05); } }

  .light-beam {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 320px; height: 100%;
    background: linear-gradient(180deg, transparent 0%, rgba(80,160,255,0.04) 20%, rgba(80,160,255,0.08) 40%, rgba(100,180,255,0.15) 60%, rgba(120,200,255,0.25) 75%, rgba(150,220,255,0.4) 85%, rgba(180,230,255,0.55) 95%, rgba(200,240,255,0.65) 100%);
    clip-path: polygon(35% 0%, 65% 0%, 80% 100%, 20% 100%);
    animation: beamPulse 3s ease-in-out infinite;
  }
  @keyframes beamPulse { 0%,100% { opacity: 0.65; width: 320px; } 50% { opacity: 1; width: 370px; } }

  .bubble {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(180,220,255,0.6), rgba(80,160,240,0.25) 60%, transparent 100%);
    box-shadow: 0 0 3px rgba(100,180,255,0.2), inset 0 0 3px rgba(200,230,255,0.3);
    animation: bubbleUp linear infinite;
  }
  @keyframes bubbleUp {
    0% { transform: translateY(0) scale(0.7); opacity: 0; }
    8% { opacity: 0.8; }
    20% { transform: translateY(-60px) scale(1.05); opacity: 1; }
    80% { opacity: 0.4; }
    100% { transform: translateY(-1080px) scale(0.3); opacity: 0; }
  }

  .content {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 10; padding: 80px;
  }
  .main-title { font-size: 80px; font-weight: 900; color: #ffffff; text-shadow: 0 0 40px rgba(80,160,255,0.6), 0 0 80px rgba(80,160,255,0.3), 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 8px; text-align: center; line-height: 1.4; }
  .sub-title { font-size: 42px; font-weight: 300; color: rgba(160,210,255,0.9); text-shadow: 0 0 20px rgba(80,160,255,0.4); letter-spacing: 4px; margin-top: 40px; text-align: center; }
  .quote-text { font-size: 68px; font-weight: 700; color: #ffffff; text-shadow: 0 0 30px rgba(80,160,255,0.5), 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 6px; text-align: center; line-height: 1.4; }
  .quote-author { font-size: 36px; font-weight: 300; color: rgba(160,210,255,0.8); letter-spacing: 3px; margin-top: 50px; }
  .body-text { font-size: 52px; font-weight: 400; color: rgba(220,235,255,0.95); text-shadow: 0 2px 8px rgba(0,0,0,0.6); letter-spacing: 2px; text-align: center; line-height: 1.6; max-width: 1400px; }
  .highlight { color: #64b5f6; font-weight: 700; }
  .end-text { font-size: 80px; font-weight: 900; color: #ffffff; text-shadow: 0 0 50px rgba(80,160,255,0.7), 0 0 100px rgba(80,160,255,0.3); letter-spacing: 10px; }
  .end-sub { font-size: 38px; font-weight: 300; color: rgba(160,210,255,0.85); letter-spacing: 4px; margin-top: 50px; }
  .corner-deco { position: absolute; top: 40px; left: 50px; font-size: 22px; color: rgba(100,180,255,0.5); letter-spacing: 2px; z-index: 10; }
  .speaker-tag { position: absolute; bottom: 40px; right: 80px; font-size: 24px; color: rgba(100,180,255,0.5); letter-spacing: 2px; z-index: 10; }
  .video-caption { position: absolute; bottom: 100px; left: 0; right: 0; text-align: center; font-size: 36px; font-weight: 900; color: #ffffff; text-shadow: 0 2px 12px rgba(0,0,0,0.8), 0 0 30px rgba(80,160,255,0.6); letter-spacing: 3px; z-index: 10; }
  .bottom-line { position: absolute; bottom: 40px; left: 10%; right: 10%; height: 2px; background: linear-gradient(90deg, transparent, rgba(80,160,255,0.6), transparent); z-index: 10; }
  /* ===== 音乐控制按钮 ===== */
  .music-btn {
    position: fixed; top: 40px; right: 50px; z-index: 9999;
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(10,22,50,0.7); border: 1.5px solid rgba(80,160,255,0.5);
    color: rgba(160,210,255,0.9); font-size: 22px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s; backdrop-filter: blur(6px);
  }
  .music-btn:hover { background: rgba(80,160,255,0.25); border-color: rgba(80,160,255,0.9); }
  .music-btn.playing { animation: musicSpin 2s linear infinite; }
  @keyframes musicSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ===== 视频页 ===== */
  .video-container {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; justify-content: center; align-items: center;
    z-index: 5;
  }
  .video-container video {
    width: 85vw; height: 85vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 0 60px rgba(80,160,255,0.3);
  }

  /* ===== 双图并排（带文字说明） ===== */
  .dual-container {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; gap: 20px;
    padding: 32px 48px 80px 48px;
    z-index: 5;
  }
  .dual-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }
  .dual-item .img-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-radius: 8px;
    background: #0a1628;
  }
  .dual-item.contain .img-wrap {
    padding: 8px;
  }
  .dual-item.contain .img-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .dual-item.cover .img-wrap {
    padding: 0;
  }
  .dual-item.cover .img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .dual-caption {
    margin-top: 16px;
    font-size: 36px;
    font-weight: 700;
    color: #ffffff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9), 0 0 20px rgba(80,160,255,0.5);
    letter-spacing: 4px;
    white-space: nowrap;
  }

  /* ===== 四宫格（带底部文字） ===== */
  .grid-container {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 6px;
    padding: 24px 28px 76px 28px;
    z-index: 5;
  }
  .grid-cell {
    position: relative;
    overflow: hidden;
    border-radius: 6px;
    background: #0a1628;
    display: flex;
    flex-direction: column;
  }
  .grid-cell img {
    flex: 1;
    width: 100%;
    min-height: 0;
    object-fit: cover;
  }
  .grid-caption {
    padding: 10px 8px 8px 8px;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.9), 0 0 16px rgba(80,160,255,0.4);
    letter-spacing: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex-shrink: 0;
  }
</style>

<script>
// ===== 气泡生成 =====
function createBubbles(containerId, count) {
  const container = document.getElementById(containerId);
  if (!container) return;
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const s = Math.random() * 5 + 1.5;
    b.style.width = s + 'px';
    b.style.height = s + 'px';
    b.style.left = Math.random() * 95 + '%';
    b.style.top = (Math.random() * 70 + 30) + '%';
    b.style.animationDuration = (Math.random() * 10 + 7) + 's';
    b.style.animationDelay = (Math.random() * 9) + 's';
    b.style.opacity = '0';
    container.appendChild(b);
  }
}
createBubbles('bubbles1', 55);
createBubbles('bubbles2', 50);
createBubbles('bubbles3', 55);
createBubbles('bubbles4', 60);
createBubbles('bubbles5', 50);
createBubbles('bubbles6', 50);
createBubbles('bubbles7', 50);
createBubbles('bubbles8', 50);
createBubbles('bubbles9', 40);
createBubbles('bubbles10', 40);
createBubbles('bubbles11', 40);
createBubbles('bubbles12', 40);
createBubbles('bubbles13', 40);

// ===== 幻灯片状态 =====
const slides = document.querySelectorAll('.slide');
const total = slides.length; // 13
let current = 0;
let direction = 1;
let timer = null;
let userNavigating = false;

function isVideoSlide(index) {
  return slides[index] && slides[index].querySelector('video') !== null;
}

function playVideo(index) {
  const video = slides[index].querySelector('video');
  if (!video) return;
  video.currentTime = 0;
  video.play().catch(()=>{});
}

function pauseVideo(index) {
  const video = slides[index].querySelector('video');
  if (video) { video.pause(); }
}

function clearAdvanceTimer() {
  if (timer) { clearTimeout(timer); timer = null; }
}

function scheduleNext() {
  clearAdvanceTimer();

  if (isVideoSlide(current)) {
    const video = slides[current].querySelector('video');
    if (video) {
      if (video.paused) video.play().catch(()=>{});
      video.onended = () => advance();
      if (video.duration && isFinite(video.duration)) {
        timer = setTimeout(advance, video.duration * 1000 + 500);
      }
    }
  } else {
    timer = setTimeout(advance, 10000);
  }
}

function advance() {
  clearAdvanceTimer();

  let next = current + direction;

  if (next >= total) { direction = -1; next = current - 1; }
  if (next < 0)     { direction = 1;  next = current + 1; }

  if (isVideoSlide(current)) {
    pauseVideo(current);
    const v = slides[current].querySelector('video');
    if (v) v.onended = null;
  }

  current = next;
  slides[current].scrollIntoView({ behavior: 'smooth' });

  if (isVideoSlide(current)) {
    setTimeout(() => playVideo(current), 600);
  }

  setTimeout(scheduleNext, 800);
}

setTimeout(scheduleNext, 10000);

document.addEventListener('keydown', (e) => {
  if (userNavigating) return;
  userNavigating = true;

  clearAdvanceTimer();
  if (isVideoSlide(current)) {
    pauseVideo(current);
    const v = slides[current].querySelector('video');
    if (v) v.onended = null;
  }

  if (e.key === 'ArrowRight' || e.key === ' ') {
    current = Math.min(current + 1, total - 1);
    direction = current === total - 1 ? -1 : 1;
  }
  if (e.key === 'ArrowLeft') {
    current = Math.max(current - 1, 0);
    direction = current === 0 ? 1 : -1;
  }
  if (e.key === 'm' || e.key === 'M') {
    const video = slides[current].querySelector('video');
    if (video) video.muted = !video.muted;
    userNavigating = false;
    return;
  }

  slides[current].scrollIntoView({ behavior: 'smooth' });

  if (isVideoSlide(current)) {
    setTimeout(() => playVideo(current), 600);
  }

  setTimeout(() => {
    userNavigating = false;
    scheduleNext();
  }, 1200);
});

document.querySelectorAll('video').forEach(v => {
  v.addEventListener('loadedmetadata', () => {
    const slide = v.closest('.slide');
    const idx = Array.from(slides).indexOf(slide);
    if (idx === current && !userNavigating) {
      clearAdvanceTimer();
      timer = setTimeout(advance, v.duration * 1000 + 500);
    }
  });
});

// ===== 背景音乐控制 =====
const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('musicBtn');
let musicPlaying = false;

function toggleMusic() {
  if (musicPlaying) {
    bgm.pause();
    musicPlaying = false;
    musicBtn.classList.remove('playing');
    musicBtn.textContent = '♪';
  } else {
    bgm.play().then(() => {
      musicPlaying = true;
      musicBtn.classList.add('playing');
      musicBtn.textContent = '♫';
    }).catch(() => {
      alert('点击页面任意位置后，音乐将自动播放');
    });
  }
}

musicBtn.addEventListener('click', toggleMusic);

// 首次点击页面时自动尝试播放音乐
let musicStarted = false;
function tryPlayMusic() {
  if (musicStarted) return;
  musicStarted = true;
  bgm.volume = 0.5;
  bgm.play().then(() => {
    musicPlaying = true;
    musicBtn.classList.add('playing');
    musicBtn.textContent = '♫';
  }).catch(() => {});
}
document.addEventListener('click', tryPlayMusic, { once: true });
document.addEventListener('touchstart', tryPlayMusic, { once: true });
</script>
