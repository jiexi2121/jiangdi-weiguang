<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江底微光 - 版本A</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; }

  /* PPT背景尺寸 16:9 */
  .slide {
    width: 1920px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    page-break-after: always;
  }

  /* ===== 版本A：深蓝渐变 + 中心光束 ===== */
  #slide1 { background: linear-gradient(180deg, #0a1628 0%, #0d2137 30%, #0a1e3d 60%, #061020 100%); }
  #slide2 { background: linear-gradient(180deg, #061020 0%, #0a1e3d 40%, #0d2137 70%, #0a1628 100%); }
  #slide3 { background: linear-gradient(180deg, #0a1628 0%, #0d2540 35%, #0a1e3d 65%, #061020 100%); }
  #slide4 { background: linear-gradient(180deg, #061020 0%, #0a1e3d 50%, #0d2137 80%, #0a1628 100%); }

  /* 水面波纹效果 */
  .water-ripple {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 120% 20% at 50% 0%, rgba(30,100,180,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 80% 15% at 45% 8%, rgba(40,120,200,0.1) 0%, transparent 60%);
    animation: ripple 8s ease-in-out infinite;
  }
  @keyframes ripple {
    0%, 100% { opacity: 0.6; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.05); }
  }

  /* 光束效果 */
  .light-beam {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 100%;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(80,160,255,0.03) 20%,
      rgba(80,160,255,0.06) 40%,
      rgba(100,180,255,0.12) 60%,
      rgba(120,200,255,0.2) 75%,
      rgba(150,220,255,0.35) 85%,
      rgba(180,230,255,0.5) 95%,
      rgba(200,240,255,0.6) 100%
    );
    clip-path: polygon(35% 0%, 65% 0%, 80% 100%, 20% 100%);
    animation: beamPulse 6s ease-in-out infinite;
  }
  @keyframes beamPulse {
    0%, 100% { opacity: 0.7; width: 300px; }
    50% { opacity: 1; width: 340px; }
  }

  /* 粒子/气泡效果 */
  .particles {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(100,180,255,0.4);
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-1080px) scale(0.3); opacity: 0; }
  }

  /* 暗流线条 */
  .current-lines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }
  .current-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(60,140,220,0.15), transparent);
    animation: flowCurrent 12s linear infinite;
  }
  @keyframes flowCurrent {
    0% { transform: translateX(-100%); opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateX(100%); opacity: 0; }
  }

  /* 文字内容 */
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    padding: 80px;
  }

  .main-title {
    font-size: 96px;
    font-weight: 900;
    color: #ffffff;
    text-shadow:
      0 0 40px rgba(80,160,255,0.6),
      0 0 80px rgba(80,160,255,0.3),
      0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 12px;
    text-align: center;
    line-height: 1.3;
  }

  .sub-title {
    font-size: 42px;
    font-weight: 300;
    color: rgba(160,210,255,0.9);
    text-shadow: 0 0 20px rgba(80,160,255,0.4);
    letter-spacing: 4px;
    margin-top: 40px;
    text-align: center;
  }

  .quote-text {
    font-size: 68px;
    font-weight: 700;
    color: #ffffff;
    text-shadow:
      0 0 30px rgba(80,160,255,0.5),
      0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 6px;
    text-align: center;
    line-height: 1.4;
  }

  .quote-author {
    font-size: 36px;
    font-weight: 300;
    color: rgba(160,210,255,0.8);
    letter-spacing: 3px;
    margin-top: 50px;
  }

  .body-text {
    font-size: 52px;
    font-weight: 400;
    color: rgba(220,235,255,0.95);
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.6;
    max-width: 1400px;
  }

  .highlight {
    color: #64b5f6;
    font-weight: 700;
  }

  .end-text {
    font-size: 80px;
    font-weight: 900;
    color: #ffffff;
    text-shadow:
      0 0 50px rgba(80,160,255,0.7),
      0 0 100px rgba(80,160,255,0.3);
    letter-spacing: 10px;
  }

  .end-sub {
    font-size: 38px;
    font-weight: 300;
    color: rgba(160,210,255,0.85);
    letter-spacing: 4px;
    margin-top: 50px;
  }

  /* 底部装饰线 */
  .bottom-line {
    position: absolute;
    bottom: 60px;
    left: 10%;
    right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(80,160,255,0.6), transparent);
    z-index: 10;
  }

  /* 左上角装饰 */
  .corner-deco {
    position: absolute;
    top: 40px;
    left: 50px;
    font-size: 22px;
    color: rgba(100,180,255,0.5);
    letter-spacing: 2px;
    z-index: 10;
  }

  /* 导航提示 */
  .nav-hint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 18px;
    z-index: 100;
    background: rgba(0,0,0,0.5);
    padding: 8px 24px;
    border-radius: 20px;
  }
</style>
</head>
<body>

<!-- ===== 幻灯片1：封面 ===== -->
<div class="slide" id="slide1">
  <div class="water-ripple"></div>
  <div class="light-beam"></div>
  <div class="particles" id="particles1"></div>
  <div class="current-lines" id="currents1"></div>

  <div class="corner-deco">龙虎网 张玲</div>

  <div class="content">
    <div class="main-title">江底一声<br>「带你回家」</div>
    <div class="sub-title">—— 我用笔打捞长江水下的生死托举</div>
  </div>

  <div class="bottom-line"></div>
</div>

<!-- ===== 幻灯片2：引言/引语 ===== -->
<div class="slide" id="slide2">
  <div class="water-ripple"></div>
  <div class="light-beam" style="opacity:0.5;"></div>
  <div class="particles" id="particles2"></div>

  <div class="content">
    <div class="quote-text">「走，带你回家」</div>
    <div class="quote-author">—— 潜水员 王翼 · 十三米江底</div>
  </div>

  <div class="bottom-line"></div>
</div>

<!-- ===== 幻灯片3：正文核心 ===== -->
<div class="slide" id="slide3">
  <div class="water-ripple"></div>
  <div class="light-beam" style="opacity:0.6;"></div>
  <div class="particles" id="particles3"></div>

  <div class="content">
    <div class="body-text">
      五小时生死搜救<br>
      <span class="highlight">十三米</span>漆黑江底<br>
      两名退伍军人以血肉之躯<br>
      守护生命最后的尊严
    </div>
  </div>

  <div class="bottom-line"></div>
</div>

<!-- ===== 幻灯片4：结尾 ===== -->
<div class="slide" id="slide4">
  <div class="water-ripple"></div>
  <div class="light-beam"></div>
  <div class="particles" id="particles4"></div>
  <div class="current-lines" id="currents4"></div>

  <div class="content">
    <div class="end-text">追光的记录者</div>
    <div class="end-sub">讲好有温度、有力量、有情怀的中国好故事</div>
  </div>

  <div class="bottom-line"></div>
</div>

<script>
// 生成粒子
function createParticles(containerId, count = 25) {
  const container = document.getElementById(containerId);
  if (!container) return;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = (Math.random() * 100 + 100) + '%';
    p.style.animationDuration = (Math.random() * 15 + 10) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.opacity = Math.random() * 0.5 + 0.2;
    container.appendChild(p);
  }
}

// 生成暗流线条
function createCurrents(containerId, count = 8) {
  const container = document.getElementById(containerId);
  if (!container) return;
  for (let i = 0; i < count; i++) {
    const line = document.createElement('div');
    line.className = 'current-line';
    line.style.top = (Math.random() * 80 + 10) + '%';
    line.style.width = (Math.random() * 300 + 200) + 'px';
    line.style.animationDuration = (Math.random() * 8 + 8) + 's';
    line.style.animationDelay = (Math.random() * 6) + 's';
    line.style.opacity = Math.random() * 0.3 + 0.1;
    container.appendChild(line);
  }
}

// 初始化所有效果
['particles1','particles2','particles3','particles4'].forEach(id => createParticles(id, 20));
['currents1','currents4'].forEach(id => createCurrents(id, 6));

// 键盘导航
let current = 0;
const slides = document.querySelectorAll('.slide');
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    current = Math.min(current + 1, slides.length - 1);
    slides[current].scrollIntoView({ behavior: 'smooth' });
  }
  if (e.key === 'ArrowLeft') {
    current = Math.max(current - 1, 0);
    slides[current].scrollIntoView({ behavior: 'smooth' });
  }
});
</script>

</body>
</html>
