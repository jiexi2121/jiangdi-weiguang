<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>封面B</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Noto Sans CJK SC', sans-serif; background: radial-gradient(ellipse at 50% 120%, #0a2040 0%, #040e1e 50%, #010810 100%); position: relative; }
.surface-light { position: absolute; top: 0; left: 0; right: 0; height: 300px; background: linear-gradient(180deg, rgba(40,120,200,0.08) 0%, rgba(30,90,160,0.04) 40%, transparent 100%); }
.surface-light::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent 0%, rgba(100,180,255,0.3) 20%, rgba(140,200,255,0.5) 50%, rgba(100,180,255,0.3) 80%, transparent 100%); animation: shimmer 6s ease-in-out infinite; }
@keyframes shimmer { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
.light-shaft { position: absolute; top: -10%; width: 180px; height: 60%; background: linear-gradient(180deg, rgba(100,180,255,0.12) 0%, rgba(80,150,255,0.06) 40%, transparent 100%); transform: perspective(800px) rotateX(30deg); animation: shaftFloat 10s ease-in-out infinite; opacity: 0.7; }
.shaft1 { left: 25%; } .shaft2 { left: 55%; animation-delay: -3s; width: 220px; opacity: 0.5; } .shaft3 { left: 72%; animation-delay: -6s; width: 150px; opacity: 0.6; }
@keyframes shaftFloat { 0%,100% { transform: perspective(800px) rotateX(30deg) translateY(0); opacity: 0.5; } 50% { transform: perspective(800px) rotateX(30deg) translateY(30px); opacity: 0.8; } }
.floater { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(120,200,255,0.6), transparent); animation: floatSlow 20s linear infinite; }
@keyframes floatSlow { 0% { transform: translate(0,0) scale(1); opacity: 0; } 10% { opacity: 1; } 50% { transform: translate(30px,-400px) scale(1.2); opacity: 0.8; } 90% { opacity: 0.4; } 100% { transform: translate(-20px,-1080px) scale(0.5); opacity: 0; } }
.glow-dot { position: absolute; border-radius: 50%; background: rgba(150,220,255,0.8); box-shadow: 0 0 6px rgba(100,180,255,0.6), 0 0 12px rgba(80,160,255,0.3); animation: glowPulse 4s ease-in-out infinite; }
@keyframes glowPulse { 0%,100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }
.content { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 80px; }
.main-title-b { font-size: 80px; font-weight: 900; color: #e8f4ff; text-shadow: 0 0 60px rgba(60,140,220,0.5), 0 0 120px rgba(40,100,180,0.2), 0 4px 8px rgba(0,0,0,0.9); letter-spacing: 8px; text-align: center; line-height: 1.4; }
.sub-title-b { font-size: 44px; font-weight: 300; color: rgba(140,200,255,0.85); text-shadow: 0 0 30px rgba(60,140,220,0.3); letter-spacing: 6px; margin-top: 50px; text-align: center; }
.top-line-b { position: absolute; top: 50px; left: 8%; right: 8%; height: 1px; background: linear-gradient(90deg, transparent, rgba(60,140,220,0.3), transparent); z-index: 10; }
.corner-deco-b { position: absolute; top: 40px; left: 60px; font-size: 20px; color: rgba(80,160,255,0.45); letter-spacing: 3px; z-index: 10; }
.bottom-line-b { position: absolute; bottom: 50px; left: 8%; right: 8%; height: 1px; background: linear-gradient(90deg, transparent, rgba(60,140,220,0.5), rgba(100,180,255,0.7), rgba(60,140,220,0.5), transparent); z-index: 10; }
</style>
</head>
<body>
<div class="surface-light"></div>
<div class="light-shaft shaft1"></div>
<div class="light-shaft shaft2"></div>
<div class="light-shaft shaft3"></div>
<script>
for(let i=0;i<25;i++){ const f=document.createElement('div'); f.className='floater'; const s=Math.random()*6+2; f.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*60+40}%;animation-duration:${Math.random()*20+15}s;animation-delay:${Math.random()*15}s;opacity:0`; document.body.appendChild(f); }
for(let i=0;i<10;i++){ const d=document.createElement('div'); d.className='glow-dot'; const s=Math.random()*4+2; d.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*90+5}%;top:${Math.random()*80+10}%;animation-duration:${Math.random()*5+3}s;animation-delay:${Math.random()*5}s`; document.body.appendChild(d); }
</script>
<div class="top-line-b"></div>
<div class="corner-deco-b">龙虎网 张玲</div>
<div class="content">
  <div class="main-title-b">江底一声<br>「带你回家」</div>
  <div class="sub-title-b">—— 我用笔打捞长江水下的生死托举</div>
</div>
<div class="bottom-line-b"></div>
</body>
</html>
