<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>核心A</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Noto Sans CJK SC', sans-serif; background: linear-gradient(180deg, #0a1628 0%, #0d2540 35%, #0a1e3d 65%, #061020 100%); position: relative; }
.light-beam { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 280px; height: 100%; background: linear-gradient(180deg, transparent 0%, rgba(80,160,255,0.04) 20%, rgba(80,160,255,0.08) 40%, rgba(100,180,255,0.14) 60%, rgba(120,200,255,0.22) 75%, rgba(150,220,255,0.35) 85%, rgba(180,230,255,0.5) 95%, rgba(200,240,255,0.6) 100%); clip-path: polygon(35% 0%, 65% 0%, 80% 100%, 20% 100%); animation: beamPulse 3s ease-in-out infinite; }
@keyframes beamPulse { 0%,100% { opacity: 0.6; width: 280px; } 50% { opacity: 0.9; width: 330px; } }

.bubble { position: absolute; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(180,220,255,0.6), rgba(80,160,240,0.25) 60%, transparent 100%); box-shadow: 0 0 3px rgba(100,180,255,0.2), inset 0 0 3px rgba(200,230,255,0.3); animation: bubbleUp linear infinite; }
@keyframes bubbleUp { 0% { transform: translateY(0) scale(0.7); opacity: 0; } 8% { opacity: 0.8; } 20% { transform: translateY(-60px) scale(1.05); opacity: 1; } 80% { opacity: 0.4; } 100% { transform: translateY(-1080px) scale(0.3); opacity: 0; } }


.content { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 80px; }
.body-text { font-size: 52px; font-weight: 400; color: rgba(220,235,255,0.95); text-shadow: 0 2px 8px rgba(0,0,0,0.6); letter-spacing: 2px; text-align: center; line-height: 1.6; max-width: 1400px; }
.highlight { color: #64b5f6; font-weight: 700; }
.speaker-tag { position: absolute; bottom: 60px; right: 80px; font-size: 24px; color: rgba(100,180,255,0.5); letter-spacing: 2px; z-index: 10; }
.bottom-line { position: absolute; bottom: 60px; left: 10%; right: 10%; height: 2px; background: linear-gradient(90deg, transparent, rgba(80,160,255,0.6), transparent); z-index: 10; }
</style>
</head>

<div class="light-beam"></div>

for(let i=0;i<55;i++){
  const b=document.createElement('div'); b.className='bubble';

  b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*95}%;top:${Math.random()*70+30}%;animation-duration:${Math.random()*10+7}s;animation-delay:${Math.random()*9}s;opacity:0`;
