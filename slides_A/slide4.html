<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>结尾A</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Noto Sans CJK SC', sans-serif; background: linear-gradient(180deg, #061020 0%, #0a1e3d 50%, #0d2137 80%, #0a1628 100%); position: relative; }
.water-ripple { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse 120% 20% at 50% 0%, rgba(30,100,180,0.12) 0%, transparent 70%); }
.light-beam { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 350px; height: 100%; background: linear-gradient(180deg, transparent 0%, rgba(80,160,255,0.05) 20%, rgba(80,160,255,0.09) 40%, rgba(100,180,255,0.16) 60%, rgba(120,200,255,0.26) 75%, rgba(150,220,255,0.4) 85%, rgba(180,230,255,0.58) 95%, rgba(200,240,255,0.7) 100%); clip-path: polygon(35% 0%, 65% 0%, 80% 100%, 20% 100%); animation: beamPulse 2.8s ease-in-out infinite; }
@keyframes beamPulse { 0%,100% { opacity: 0.7; width: 350px; } 50% { opacity: 1; width: 400px; } }

.bubble { position: absolute; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(180,220,255,0.6), rgba(80,160,240,0.25) 60%, transparent 100%); box-shadow: 0 0 3px rgba(100,180,255,0.2), inset 0 0 3px rgba(200,230,255,0.3); animation: bubbleUp linear infinite; }
@keyframes bubbleUp { 0% { transform: translateY(0) scale(0.7); opacity: 0; } 8% { opacity: 0.8; } 20% { transform: translateY(-60px) scale(1.05); opacity: 1; } 80% { opacity: 0.4; } 100% { transform: translateY(-1080px) scale(0.3); opacity: 0; } }

.content { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 80px; }
.end-text { font-size: 80px; font-weight: 900; color: #ffffff; text-shadow: 0 0 50px rgba(80,160,255,0.7), 0 0 100px rgba(80,160,255,0.3); letter-spacing: 10px; }
.end-sub { font-size: 38px; font-weight: 300; color: rgba(160,210,255,0.85); letter-spacing: 4px; margin-top: 50px; }
.speaker-tag { position: absolute; bottom: 60px; right: 80px; font-size: 24px; color: rgba(100,180,255,0.5); letter-spacing: 2px; z-index: 10; }
.bottom-line { position: absolute; bottom: 60px; left: 10%; right: 10%; height: 2px; background: linear-gradient(90deg, transparent, rgba(80,160,255,0.6), transparent); z-index: 10; }
</style>
</head>
<body>
<div class="water-ripple"></div>
<div class="light-beam"></div>
<script>
for(let i=0;i<60;i++){
  const b=document.createElement('div'); b.className='bubble';
  const s=Math.random()*5+1.5;
  b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*95}%;top:${Math.random()*70+30}%;animation-duration:${Math.random()*9+5}s;animation-delay:${Math.random()*7}s;opacity:0`;
  document.body.appendChild(b);
}
</script>
<div class="content">
  <div class="end-text">追光的记录者</div>
  <div class="end-sub">讲好有温度、有力量、有情怀的中国好故事</div>
</div>
<div class="speaker-tag">龙虎网 张玲</div>
<div class="bottom-line"></div>
</body>
</html>
