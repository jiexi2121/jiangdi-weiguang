<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>封面A</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Noto Sans CJK SC', sans-serif; background: linear-gradient(180deg, #0a1628 0%, #0d2137 30%, #0a1e3d 60%, #061020 100%); position: relative; }
.water-ripple { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse 120% 20% at 50% 0%, rgba(30,100,180,0.15) 0%, transparent 70%); }
.light-beam { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 320px; height: 100%; background: linear-gradient(180deg, transparent 0%, rgba(80,160,255,0.04) 20%, rgba(80,160,255,0.08) 40%, rgba(100,180,255,0.15) 60%, rgba(120,200,255,0.25) 75%, rgba(150,220,255,0.4) 85%, rgba(180,230,255,0.55) 95%, rgba(200,240,255,0.65) 100%); clip-path: polygon(35% 0%, 65% 0%, 80% 100%, 20% 100%); animation: beamPulse 3s ease-in-out infinite; }
@keyframes beamPulse { 0%,100% { opacity: 0.65; width: 320px; } 50% { opacity: 1; width: 370px; } }

/* 气泡 - 更小更细腻 */
.bubble { position: absolute; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(180,220,255,0.6), rgba(80,160,240,0.25) 60%, transparent 100%); box-shadow: 0 0 3px rgba(100,180,255,0.2), inset 0 0 3px rgba(200,230,255,0.3); animation: bubbleUp linear infinite; }
@keyframes bubbleUp { 0% { transform: translateY(0) scale(0.7); opacity: 0; } 8% { opacity: 0.8; } 20% { transform: translateY(-60px) scale(1.05); opacity: 1; } 80% { opacity: 0.4; } 100% { transform: translateY(-1080px) scale(0.3); opacity: 0; } }

/* 潜水员剪影 - 写实风格，往上游姿态 */

.content { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 80px; }
.main-title { font-size: 80px; font-weight: 900; color: #ffffff; text-shadow: 0 0 40px rgba(80,160,255,0.6), 0 0 80px rgba(80,160,255,0.3), 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 8px; text-align: center; line-height: 1.4; }
.sub-title { font-size: 42px; font-weight: 300; color: rgba(160,210,255,0.9); text-shadow: 0 0 20px rgba(80,160,255,0.4); letter-spacing: 4px; margin-top: 40px; }
.corner-deco { position: absolute; top: 40px; left: 50px; font-size: 22px; color: rgba(100,180,255,0.5); letter-spacing: 2px; z-index: 10; }
.bottom-line { position: absolute; bottom: 60px; left: 10%; right: 10%; height: 2px; background: linear-gradient(90deg, transparent, rgba(80,160,255,0.6), transparent); z-index: 10; }
</style>
</head>
<body>
<div class="water-ripple"></div>
<div class="light-beam"></div>


<script>
// 大量小气泡
for(let i=0;i<55;i++){
  const b=document.createElement('div'); b.className='bubble';
  const s=Math.random()*5+1.5;
  b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*95}%;top:${Math.random()*70+30}%;animation-duration:${Math.random()*10+7}s;animation-delay:${Math.random()*9}s;opacity:0`;
  document.body.appendChild(b);
}
</script>
<div class="corner-deco">龙虎网 张玲</div>
<div class="content">
  <div class="main-title">江底一声<br>「带你回家」</div>
  <div class="sub-title">—— 我用笔打捞长江水下的生死托举</div>
</div>
<div class="bottom-line"></div>
</body>
</html>
