<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江底微光 - 版本B</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow-x: hidden; font-family: 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; }

  .slide {
    width: 1920px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    page-break-after: always;
  }

  /* ===== 版本B：墨黑深海 + 水面透光的粒子 ===== */

  /* 背景 - 更深的墨黑色调 */
  #slideB1 { background: radial-gradient(ellipse at 50% 120%, #0a2040 0%, #040e1e 50%, #010810 100%); }
  #slideB2 { background: radial-gradient(ellipse at 50% 80%, #061428 0%, #030c18 60%, #010610 100%); }
  #slideB3 { background: radial-gradient(ellipse at 50% 100%, #082238 0%, #041020 50%, #010810 100%); }
  #slideB4 { background: radial-gradient(ellipse at 50% 110%, #0a1e35 0%, #060e20 50%, #020810 100%); }

  /* 水面透光效果 - 从上方透下来的光柱 */
  .light-shaft {
    position: absolute;
    top: -10%;
    width: 180px;
    height: 60%;
    background: linear-gradient(180deg,
      rgba(100,180,255,0.12) 0%,
      rgba(80,150,255,0.06) 40%,
      transparent 100%
    );
    transform: perspective(800px) rotateX(30deg);
    animation: shaftFloat 10s ease-in-out infinite;
    opacity: 0.7;
  }
  .shaft1 { left: 25%; animation-delay: 0s; }
  .shaft2 { left: 55%; animation-delay: -3s; width: 220px; opacity: 0.5; }
  .shaft3 { left: 72%; animation-delay: -6s; width: 150px; opacity: 0.6; }

  @keyframes shaftFloat {
    0%, 100% { transform: perspective(800px) rotateX(30deg) translateY(0); opacity: 0.5; }
    50% { transform: perspective(800px) rotateX(30deg) translateY(30px); opacity: 0.8; }
  }

  /* 水面波纹光效 - 顶部 */
  .surface-light {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 300px;
    background: linear-gradient(180deg,
      rgba(40,120,200,0.08) 0%,
      rgba(30,90,160,0.04) 40%,
      transparent 100%
    );
  }
  .surface-light::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(100,180,255,0.3) 20%,
      rgba(140,200,255,0.5) 50%,
      rgba(100,180,255,0.3) 80%,
      transparent 100%
    );
    animation: surfaceShimmer 6s ease-in-out infinite;
  }
  @keyframes surfaceShimmer {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* 漂浮微粒/浮游生物效果 */
  .floaties {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }
  .floater {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(120,200,255,0.6), transparent);
    animation: floatSlow linear infinite;
  }
  @keyframes floatSlow {
    0% { transform: translate(0, 0) scale(1); opacity: 0; }
    10% { opacity: 1; }
    50% { transform: translate(30px, -400px) scale(1.2); opacity: 0.8; }
    90% { opacity: 0.4; }
    100% { transform: translate(-20px, -1080px) scale(0.5); opacity: 0; }
  }

  /* 深海暗流 - 弧线 */
  .deep-current {
    position: absolute;
    border: none;
    border-bottom: 1px solid rgba(40,100,180,0.1);
    border-radius: 50%;
    animation: deepFlow 20s linear infinite;
  }
  @keyframes deepFlow {
    0% { transform: translateX(-200px) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateX(200px) rotate(5deg); opacity: 0; }
  }

  /* 星光/微光点 */
  .glow-dot {
    position: absolute;
    border-radius: 50%;
    background: rgba(150,220,255,0.8);
    box-shadow: 0 0 6px rgba(100,180,255,0.6), 0 0 12px rgba(80,160,255,0.3);
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  /* ===== 文字样式 ===== */
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    padding: 80px;
  }

  .main-title-b {
    font-size: 100px;
    font-weight: 900;
    color: #e8f4ff;
    text-shadow:
      0 0 60px rgba(60,140,220,0.5),
      0 0 120px rgba(40,100,180,0.2),
      0 4px 8px rgba(0,0,0,0.9);
    letter-spacing: 16px;
    text-align: center;
    line-height: 1.3;
  }

  .sub-title-b {
    font-size: 44px;
    font-weight: 300;
    color: rgba(140,200,255,0.85);
    text-shadow: 0 0 30px rgba(60,140,220,0.3);
    letter-spacing: 6px;
    margin-top: 50px;
    text-align: center;
  }

  .quote-text-b {
    font-size: 72px;
    font-weight: 700;
    color: #e8f4ff;
    text-shadow:
      0 0 40px rgba(60,140,220,0.6),
      0 4px 8px rgba(0,0,0,0.8);
    letter-spacing: 8px;
    text-align: center;
    line-height: 1.5;
  }

  .quote-author-b {
    font-size: 34px;
    font-weight: 300;
    color: rgba(120,190,255,0.75);
    letter-spacing: 3px;
    margin-top: 60px;
  }

  .body-text-b {
    font-size: 54px;
    font-weight: 400;
    color: rgba(200,230,255,0.95);
    text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    letter-spacing: 3px;
    text-align: center;
    line-height: 1.7;
    max-width: 1500px;
  }

  .highlight-b {
    color: #90caf9;
    font-weight: 700;
    text-shadow: 0 0 20px rgba(100,180,255,0.5);
  }

  .end-text-b {
    font-size: 84px;
    font-weight: 900;
    color: #e8f4ff;
    text-shadow:
      0 0 60px rgba(60,140,220,0.6),
      0 0 120px rgba(40,100,180,0.3);
    letter-spacing: 12px;
  }

  .end-sub-b {
    font-size: 40px;
    font-weight: 300;
    color: rgba(140,200,255,0.85);
    letter-spacing: 4px;
    margin-top: 60px;
  }

  /* 装饰线 */
  .bottom-line-b {
    position: absolute;
    bottom: 50px;
    left: 8%;
    right: 8%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(60,140,220,0.5), rgba(100,180,255,0.7), rgba(60,140,220,0.5), transparent);
    z-index: 10;
  }

  .top-line-b {
    position: absolute;
    top: 50px;
    left: 8%;
    right: 8%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(60,140,220,0.3), transparent);
    z-index: 10;
  }

  .corner-deco-b {
    position: absolute;
    top: 40px;
    left: 60px;
    font-size: 20px;
    color: rgba(80,160,255,0.45);
    letter-spacing: 3px;
    z-index: 10;
  }

  .page-num {
    position: absolute;
    bottom: 40px;
    right: 60px;
    font-size: 18px;
    color: rgba(80,160,255,0.35);
    z-index: 10;
  }

  .nav-hint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 18px;
    z-index: 100;
    background: rgba(0,0,0,0.5);
    padding: 8px 24px;
    border-radius: 20px;
  }
</style>
</head>
<body>

<!-- ===== 幻灯片B1：封面 ===== -->
<div class="slide" id="slideB1">
  <div class="surface-light"></div>
  <div class="light-shaft shaft1"></div>
  <div class="light-shaft shaft2"></div>
  <div class="light-shaft shaft3"></div>
  <div class="floaties" id="floatiesB1"></div>
  <div class="glow-dots" id="glowDotsB1"></div>

  <div class="top-line-b"></div>
  <div class="corner-deco-b">龙虎网 张玲</div>

  <div class="content">
    <div class="main-title-b">江底一声<br>「带你回家」</div>
    <div class="sub-title-b">—— 我用笔打捞长江水下的生死托举</div>
  </div>

  <div class="bottom-line-b"></div>
  <div class="page-num">01</div>
</div>

<!-- ===== 幻灯片B2：核心引语 ===== -->
<div class="slide" id="slideB2">
  <div class="surface-light" style="opacity:0.6;"></div>
  <div class="light-shaft shaft1" style="opacity:0.4;"></div>
  <div class="light-shaft shaft2" style="opacity:0.3;"></div>
  <div class="floaties" id="floatiesB2"></div>

  <div class="top-line-b"></div>

  <div class="content">
    <div class="quote-text-b">「走，带你回家」</div>
    <div class="quote-author-b">潜水员 王翼 · 十三米江底 · 黑暗中独自坚守数十分钟</div>
  </div>

  <div class="bottom-line-b"></div>
  <div class="page-num">02</div>
</div>

<!-- ===== 幻灯片B3：故事核心 ===== -->
<div class="slide" id="slideB3">
  <div class="surface-light"></div>
  <div class="light-shaft shaft1"></div>
  <div class="light-shaft shaft3" style="opacity:0.5;"></div>
  <div class="floaties" id="floatiesB3"></div>
  <div class="glow-dots" id="glowDotsB3"></div>

  <div class="top-line-b"></div>

  <div class="content">
    <div class="body-text-b">
      十三米漆黑江底<br>
      <span class="highlight-b">零能见度</span> · 每秒1.2米暗流<br>
      五小时生死搜救<br>
      两名退伍军人以血肉之躯<br>
      守护生命最后的尊严
    </div>
  </div>

  <div class="bottom-line-b"></div>
  <div class="page-num">03</div>
</div>

<!-- ===== 幻灯片B4：结尾 ===== -->
<div class="slide" id="slideB4">
  <div class="surface-light"></div>
  <div class="light-shaft shaft1"></div>
  <div class="light-shaft shaft2"></div>
  <div class="light-shaft shaft3"></div>
  <div class="floaties" id="floatiesB4"></div>
  <div class="glow-dots" id="glowDotsB4"></div>

  <div class="top-line-b"></div>
  <div class="corner-deco-b">龙虎网 张玲</div>

  <div class="content">
    <div class="end-text-b">愿永远做追光的记录者</div>
    <div class="end-sub-b">脚下沾泥土，心中有光亮，肩上有担当</div>
  </div>

  <div class="bottom-line-b"></div>
  <div class="page-num">04</div>
</div>

<script>
// 生成漂浮微粒
function createFloaties(containerId, count = 30) {
  const container = document.getElementById(containerId);
  if (!container) return;
  for (let i = 0; i < count; i++) {
    const f = document.createElement('div');
    f.className = 'floater';
    const size = Math.random() * 6 + 2;
    f.style.width = size + 'px';
    f.style.height = size + 'px';
    f.style.left = Math.random() * 100 + '%';
    f.style.top = (Math.random() * 60 + 40) + '%';
    f.style.animationDuration = (Math.random() * 20 + 15) + 's';
    f.style.animationDelay = (Math.random() * 15) + 's';
    f.style.opacity = 0;
    container.appendChild(f);
  }
}

// 生成微光点
function createGlowDots(containerId, count = 12) {
  const container = document.getElementById(containerId);
  if (!container) return;
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'glow-dot';
    const size = Math.random() * 4 + 2;
    d.style.width = size + 'px';
    d.style.height = size + 'px';
    d.style.left = Math.random() * 90 + 5 + '%';
    d.style.top = Math.random() * 80 + 10 + '%';
    d.style.animationDuration = (Math.random() * 5 + 3) + 's';
    d.style.animationDelay = (Math.random() * 5) + 's';
    container.appendChild(d);
  }
}

// 初始化
['floatiesB1','floatiesB2','floatiesB3','floatiesB4'].forEach(id => createFloaties(id, 25));
['glowDotsB1','glowDotsB3','glowDotsB4'].forEach(id => createGlowDots(id, 10));

// 键盘导航
let currentB = 0;
const slidesB = document.querySelectorAll('.slide');
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    currentB = Math.min(currentB + 1, slidesB.length - 1);
    slidesB[currentB].scrollIntoView({ behavior: 'smooth' });
  }
  if (e.key === 'ArrowLeft') {
    currentB = Math.max(currentB - 1, 0);
    slidesB[currentB].scrollIntoView({ behavior: 'smooth' });
  }
});
</script>

</body>
</html>
