<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江底微光 - 超宽屏版 3480x1653</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; }

  /* 固定比例 3480:1653，根据浏览器宽度等比缩放，居中 */
  :root {
    --ratio-w: 3480;
    --ratio-h: 1653;
  }
  #viewport {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: calc(var(--ratio-w) * 1px);
    height: calc(var(--ratio-h) * 1px);
    transform-origin: center center;
    overflow: hidden;
  }

  .slide { width: calc(var(--ratio-w) * 1px); height: calc(var(--ratio-h) * 1px); position: relative; overflow: hidden; }

  #slide1 { background: linear-gradient(180deg, #0a1628 0%, #0d2137 30%, #0a1e3d 60%, #061020 100%); }
  #slide2 { background: linear-gradient(180deg, #061020 0%, #0a1e3d 40%, #0d2137 70%, #0a1628 100%); }
  #slide3 { background: linear-gradient(180deg, #0a1628 0%, #0d2540 35%, #0a1e3d 65%, #061020 100%); }
  #slide4 { background: linear-gradient(180deg, #061020 0%, #0a1e3d 50%, #0d2137 80%, #0a1628 100%); }

  .water-ripple {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse 120% 20% at 50% 0%, rgba(30,100,180,0.15) 0%, transparent 70%);
    animation: ripple 4s ease-in-out infinite;
  }
  @keyframes ripple { 0%,100% { opacity: 0.6; transform: scaleY(1); } 50% { opacity: 1; transform: scaleY(1.05); } }

  .light-beam {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 500px; height: 100%;
    background: linear-gradient(180deg, transparent 0%, rgba(80,160,255,0.04) 20%, rgba(80,160,255,0.08) 40%, rgba(100,180,255,0.15) 60%, rgba(120,200,255,0.25) 75%, rgba(150,220,255,0.4) 85%, rgba(180,230,255,0.55) 95%, rgba(200,240,255,0.65) 100%);
    clip-path: polygon(35% 0%, 65% 0%, 80% 100%, 20% 100%);
    animation: beamPulse 3s ease-in-out infinite;
  }
  @keyframes beamPulse { 0%,100% { opacity: 0.65; width: 500px; } 50% { opacity: 1; width: 560px; } }

  .bubble {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(180,220,255,0.6), rgba(80,160,240,0.25) 60%, transparent 100%);
    box-shadow: 0 0 3px rgba(100,180,255,0.2), inset 0 0 3px rgba(200,230,255,0.3);
    animation: bubbleUp linear infinite;
  }
  @keyframes bubbleUp {
    0% { transform: translateY(0) scale(0.7); opacity: 0; }
    8% { opacity: 0.8; }
    20% { transform: translateY(-80px) scale(1.05); opacity: 1; }
    80% { opacity: 0.4; }
    100% { transform: translateY(-1653px) scale(0.3); opacity: 0; }
  }

  .content {
    position: absolute; top: -8%; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 10; padding: 120px;
  }
  .main-title { font-size: 140px; font-weight: 900; color: #ffffff; text-shadow: 0 0 50px rgba(80,160,255,0.6), 0 0 100px rgba(80,160,255,0.3), 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 14px; text-align: center; line-height: 1.4; }
  .sub-title { font-size: 72px; font-weight: 300; color: rgba(160,210,255,0.9); text-shadow: 0 0 25px rgba(80,160,255,0.4); letter-spacing: 8px; margin-top: 60px; text-align: center; }
  .quote-text { font-size: 115px; font-weight: 700; color: #ffffff; text-shadow: 0 0 40px rgba(80,160,255,0.5), 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 10px; text-align: center; line-height: 1.4; }
  .quote-author { font-size: 60px; font-weight: 300; color: rgba(160,210,255,0.8); letter-spacing: 5px; margin-top: 70px; }
  .body-text { font-size: 86px; font-weight: 400; color: rgba(220,235,255,0.95); text-shadow: 0 2px 8px rgba(0,0,0,0.6); letter-spacing: 4px; text-align: center; line-height: 1.7; max-width: 2400px; }
  .highlight { color: #64b5f6; font-weight: 700; }
  .end-text { font-size: 140px; font-weight: 900; color: #ffffff; text-shadow: 0 0 60px rgba(80,160,255,0.7), 0 0 120px rgba(80,160,255,0.3); letter-spacing: 16px; }
  .end-sub { font-size: 66px; font-weight: 300; color: rgba(160,210,255,0.85); letter-spacing: 8px; margin-top: 70px; }
  .corner-deco { position: absolute; top: 50px; left: 60px; font-size: 30px; color: rgba(100,180,255,0.5); letter-spacing: 3px; z-index: 10; }
  .speaker-tag { position: absolute; bottom: 70px; right: 90px; font-size: 32px; color: rgba(100,180,255,0.5); letter-spacing: 3px; z-index: 10; }
  .bottom-line { position: absolute; bottom: 70px; left: 12%; right: 12%; height: 2px; background: linear-gradient(90deg, transparent, rgba(80,160,255,0.6), transparent); z-index: 10; }
</style>
</head>
<body>
<div id="viewport">

<!-- 幻灯片1：封面 -->
<div class="slide" id="slide1">
  <div class="water-ripple"></div>
  <div class="light-beam"></div>
  <div class="bubbles" id="bubbles1"></div>

  <div class="corner-deco">龙虎网 张玲</div>
  <div class="content">
    <div class="main-title">江底一声<br>「带你回家」</div>
    <div class="sub-title">—— 我用笔打捞长江水下的生死托举</div>
  </div>
  <div class="bottom-line"></div>
</div>

<!-- 幻灯片2：引语 -->
<div class="slide" id="slide2">
  <div class="light-beam"></div>
  <div class="bubbles" id="bubbles2"></div>

  <div class="content">
    <div class="quote-text">「走，带你回家」</div>
    <div class="quote-author">—— 潜水员 王翼 · 十三米江底</div>
  </div>
  <div class="speaker-tag">龙虎网 张玲</div>
  <div class="bottom-line"></div>
</div>

<!-- 幻灯片3：核心 -->
<div class="slide" id="slide3">
  <div class="light-beam"></div>
  <div class="bubbles" id="bubbles3"></div>
  <div class="content">
    <div class="body-text">
      五小时生死搜救<br>
      <span class="highlight">十三米</span>漆黑江底<br>
      两名搜救人员以血肉之躯<br>
      守护生命最后的尊严
    </div>
  </div>
  <div class="speaker-tag">龙虎网 张玲</div>
  <div class="bottom-line"></div>
</div>

<!-- 幻灯片4：结尾 -->
<div class="slide" id="slide4">
  <div class="water-ripple"></div>
  <div class="light-beam"></div>
  <div class="bubbles" id="bubbles4"></div>

  <div class="content">
    <div class="end-text">追光的记录者</div>
    <div class="end-sub">讲好有温度、有力量、有情怀的好故事</div>
  </div>
  <div class="speaker-tag">龙虎网 张玲</div>
  <div class="bottom-line"></div>
</div>

</div><!-- /viewport -->

<script>
// 固定比例缩放：根据浏览器宽度算出scale，保持3480:1653
const RATIO_W = 3480, RATIO_H = 1653;
const viewport = document.getElementById('viewport');

function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  // 按宽度等比缩放，如果高度超出则按高度
  let scale = vw / RATIO_W;
  if (scale * RATIO_H > vh) {
    scale = vh / RATIO_H;
  }
  viewport.style.transform = `translate(-50%, -50%) scale(${scale})`;
}

window.addEventListener('resize', resize);
resize();

// ---- 气泡 ----
function createBubbles(containerId, count) {
  const container = document.getElementById(containerId);
  if (!container) return;
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const s = Math.random() * 6 + 2;
    b.style.width = s + 'px';
    b.style.height = s + 'px';
    b.style.left = Math.random() * 95 + '%';
    b.style.top = (Math.random() * 70 + 30) + '%';
    b.style.animationDuration = (Math.random() * 10 + 7) + 's';
    b.style.animationDelay = (Math.random() * 9) + 's';
    b.style.opacity = '0';
    container.appendChild(b);
  }
}

createBubbles('bubbles1', 70);
createBubbles('bubbles2', 65);
createBubbles('bubbles3', 70);
createBubbles('bubbles4', 75);

let current = 0;
let direction = 1;
const slides = document.querySelectorAll('.slide');
const total = slides.length;

function autoSlide() {
  current += direction;
  if (current === total - 1) direction = -1;
  if (current === 0) direction = 1;
  slides[current].scrollIntoView({ behavior: 'smooth' });
}
setInterval(autoSlide, 10000);

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    current = Math.min(current + 1, total - 1);
    direction = current === total - 1 ? -1 : 1;
    slides[current].scrollIntoView({ behavior: 'smooth' });
  }
  if (e.key === 'ArrowLeft') {
    current = Math.max(current - 1, 0);
    direction = current === 0 ? 1 : -1;
    slides[current].scrollIntoView({ behavior: 'smooth' });
  }
});
</script>
</body>
</html>
