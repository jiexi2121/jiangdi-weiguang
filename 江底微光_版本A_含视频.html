<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江底微光 - 版本A</title>
<style>
  * { margin:0; padding:0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; }

  .slide { width: 100vw; height: 100vh; position: relative; overflow: hidden; }

  #slide1 { background: linear-gradient(180deg, #0a1628 0%, #0d2137 30%, #0a1e3d 60%, #061020 100%); }
  #slide2 { background: linear-gradient(180deg, #061020 0%, #0a1e3d 40%, #0d2137 70%, #0a1628 100%); }
  #slide3 { background: linear-gradient(180deg, #0a1628 0%, #0d2540 35%, #0a1e3d 65%, #061020 100%); }
  #slide4 { background: linear-gradient(180deg, #061020 0%, #0a1e3d 50%, #0d2137 80%, #0a1628 100%); }
  #slide5, #slide6, #slide7, #slide8, #slide9, #slide10 { background: #000; }

  .water-ripple {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse 120% 20% at 50% 0%, rgba(30,100,180,0.15) 0%, transparent 70%);
    animation: ripple 4s ease-in-out infinite;
  }
  @keyframes ripple { 0%,100% { opacity: 0.6; transform: scaleY(1); } 50% { opacity: 1; transform: scaleY(1.05); } }

  .light-beam {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 320px; height: 100%;
    background: linear-gradient(180deg, transparent 0%, rgba(80,160,255,0.04) 20%, rgba(80,160,255,0.08) 40%, rgba(100,180,255,0.15) 60%, rgba(120,200,255,0.25) 75%, rgba(150,220,255,0.4) 85%, rgba(180,230,255,0.55) 95%, rgba(200,240,255,0.65) 100%);
    clip-path: polygon(35% 0%, 65% 0%, 80% 100%, 20% 100%);
    animation: beamPulse 3s ease-in-out infinite;
  }
  @keyframes beamPulse { 0%,100% { opacity: 0.65; width: 320px; } 50% { opacity: 1; width: 370px; } }

  .bubble {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(180,220,255,0.6), rgba(80,160,240,0.25) 60%, transparent 100%);
    box-shadow: 0 0 3px rgba(100,180,255,0.2), inset 0 0 3px rgba(200,230,255,0.3);
    animation: bubbleUp linear infinite;
  }
  @keyframes bubbleUp {
    0% { transform: translateY(0) scale(0.7); opacity: 0; }
    8% { opacity: 0.8; }
    20% { transform: translateY(-60px) scale(1.05); opacity: 1; }
    80% { opacity: 0.4; }
    100% { transform: translateY(-1080px) scale(0.3); opacity: 0; }
  }

  .content {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 10; padding: 80px;
  }
  .main-title { font-size: 80px; font-weight: 900; color: #ffffff; text-shadow: 0 0 40px rgba(80,160,255,0.6), 0 0 80px rgba(80,160,255,0.3), 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 8px; text-align: center; line-height: 1.4; }
  .sub-title { font-size: 42px; font-weight: 300; color: rgba(160,210,255,0.9); text-shadow: 0 0 20px rgba(80,160,255,0.4); letter-spacing: 4px; margin-top: 40px; text-align: center; }
  .quote-text { font-size: 68px; font-weight: 700; color: #ffffff; text-shadow: 0 0 30px rgba(80,160,255,0.5), 0 2px 4px rgba(0,0,0,0.8); letter-spacing: 6px; text-align: center; line-height: 1.4; }
  .quote-author { font-size: 36px; font-weight: 300; color: rgba(160,210,255,0.8); letter-spacing: 3px; margin-top: 50px; }
  .body-text { font-size: 52px; font-weight: 400; color: rgba(220,235,255,0.95); text-shadow: 0 2px 8px rgba(0,0,0,0.6); letter-spacing: 2px; text-align: center; line-height: 1.6; max-width: 1400px; }
  .highlight { color: #64b5f6; font-weight: 700; }
  .end-text { font-size: 80px; font-weight: 900; color: #ffffff; text-shadow: 0 0 50px rgba(80,160,255,0.7), 0 0 100px rgba(80,160,255,0.3); letter-spacing: 10px; }
  .end-sub { font-size: 38px; font-weight: 300; color: rgba(160,210,255,0.85); letter-spacing: 4px; margin-top: 50px; }
  .corner-deco { position: absolute; top: 40px; left: 50px; font-size: 22px; color: rgba(100,180,255,0.5); letter-spacing: 2px; z-index: 10; }
  .speaker-tag { position: absolute; bottom: 60px; right: 80px; font-size: 24px; color: rgba(100,180,255,0.5); letter-spacing: 2px; z-index: 10; }
  .bottom-line { position: absolute; bottom: 60px; left: 10%; right: 10%; height: 2px; background: linear-gradient(90deg, transparent, rgba(80,160,255,0.6), transparent); z-index: 10; }
  .nav-hint { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-size: 18px; z-index: 100; background: rgba(0,0,0,0.5); padding: 8px 24px; border-radius: 20px; }

  .video-container {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; justify-content: center; align-items: center;
    z-index: 5;
  }
  .video-container video {
    width: 85vw;
    height: 85vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 0 60px rgba(80,160,255,0.3);
  }

  /* 四宫格图片页 */
  .grid-container {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
    padding: 40px;
    z-index: 5;
  }
  .grid-container img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.08);
    transition: transform 0.3s ease;
  }
</style>
</head>
<body>

  <div class="light-beam"></div>

  <div class="bubbles" id="bubbles10"></div>
  <div class="grid-container">
    <img src="grid2_1.jpg" alt="采访照片5">
    <img src="grid2_2.jpg" alt="采访照片6">
    <img src="grid2_3.jpg" alt="采访照片7">
    <img src="grid2_4.jpg" alt="采访照片8">
  </div>
  <div class="speaker-tag">龙虎网 张玲</div>
</div>

<script>
// ===== 气泡生成 =====
function createBubbles(containerId, count) {
  const container = document.getElementById(containerId);
  if (!container) return;
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const s = Math.random() * 5 + 1.5;
    b.style.width = s + 'px';
    b.style.height = s + 'px';
    b.style.left = Math.random() * 95 + '%';
    b.style.top = (Math.random() * 70 + 30) + '%';
    b.style.animationDuration = (Math.random() * 10 + 7) + 's';
    b.style.animationDelay = (Math.random() * 9) + 's';
    b.style.opacity = '0';
    container.appendChild(b);
  }
}
createBubbles('bubbles1', 55);
createBubbles('bubbles2', 50);
createBubbles('bubbles3', 55);
createBubbles('bubbles4', 60);
createBubbles('bubbles5', 50);
createBubbles('bubbles6', 50);
createBubbles('bubbles7', 50);
createBubbles('bubbles8', 50);
createBubbles('bubbles9', 40);
createBubbles('bubbles10', 40);

// ===== 幻灯片状态 =====
const slides = document.querySelectorAll('.slide');
const total = slides.length; // 10
let current = 0;
let direction = 1;          // 1=前进 -1=后退
let timer = null;            // 当前计时器
let userNavigating = false;  // 用户是否正在手动翻页

// 判断某页是否为视频页
function isVideoSlide(index) {
  const slide = slides[index];
  return slide && slide.querySelector('video') !== null;
}

// 获取视频时长（秒），如果还未加载完成返回 null
function getVideoDuration(index) {
  const video = slides[index].querySelector('video');
  if (video && video.duration && isFinite(video.duration)) {
    return video.duration * 1000; // 转毫秒
  }
  return null;
}

// 播放视频页的视频
function playVideo(index) {
  const video = slides[index].querySelector('video');
  if (!video) return;
  video.currentTime = 0;
  video.play().catch(()=>{});
}

// 暂停视频
function pauseVideo(index) {
  const video = slides[index].querySelector('video');
  if (video) { video.pause(); }
}

// 清除当前计时器
function clearAdvanceTimer() {
  if (timer) { clearTimeout(timer); timer = null; }
}

// 安排下一次自动切换
function scheduleNext() {
  clearAdvanceTimer();

  const nextIndex = current + direction;

  // 到达两端时反转方向
  if (nextIndex >= total) {
    direction = -1;
  }
  if (nextIndex < 0) {
    direction = 1;
  }

  const targetIndex = current + direction;

  if (isVideoSlide(current)) {
    // 当前是视频页：视频播完后再切换
    const video = slides[current].querySelector('video');
    if (video) {
      // 确保视频在播放
      if (video.paused) video.play().catch(()=>{});
      video.onended = () => {
        advance();
      };
      // 备用：如果视频 duration 可用，也用 setTimeout 兜底
      if (video.duration && isFinite(video.duration)) {
        timer = setTimeout(advance, video.duration * 1000 + 500);
      }
    }
  } else {
    // 当前是文字页：10秒后切换
    timer = setTimeout(advance, 10000);
  }
}

// 执行切换
function advance() {
  clearAdvanceTimer();

  let next = current + direction;

  // 边界反转
  if (next >= total) { direction = -1; next = current - 1; }
  if (next < 0)     { direction = 1;  next = current + 1; }

  // 离开当前页：暂停视频
  if (isVideoSlide(current)) {
    pauseVideo(current);
    const v = slides[current].querySelector('video');
    if (v) v.onended = null;
  }

  current = next;
  slides[current].scrollIntoView({ behavior: 'smooth' });

  // 进入新页：如果是视频页则播放
  if (isVideoSlide(current)) {
    // 等 scroll 动画结束后再播放
    setTimeout(() => playVideo(current), 600);
  }

  // 安排下一次切换
  setTimeout(scheduleNext, 800);
}

// 启动自动轮播
setTimeout(scheduleNext, 10000);

// ===== 键盘翻页 =====
document.addEventListener('keydown', (e) => {
  if (userNavigating) return;
  userNavigating = true;

  clearAdvanceTimer();
  if (isVideoSlide(current)) {
    pauseVideo(current);
    const v = slides[current].querySelector('video');
    if (v) v.onended = null;
  }

  if (e.key === 'ArrowRight' || e.key === ' ') {
    current = Math.min(current + 1, total - 1);
    direction = current === total - 1 ? -1 : 1;
  }
  if (e.key === 'ArrowLeft') {
    current = Math.max(current - 1, 0);
    direction = current === 0 ? 1 : -1;
  }
  // M键切换静音
  if (e.key === 'm' || e.key === 'M') {
    const video = slides[current].querySelector('video');
    if (video) video.muted = !video.muted;
    userNavigating = false;
    return;
  }

  slides[current].scrollIntoView({ behavior: 'smooth' });

  if (isVideoSlide(current)) {
    setTimeout(() => playVideo(current), 600);
  }

  setTimeout(() => {
    userNavigating = false;
    scheduleNext();
  }, 1200);
});

// ===== 视频元数据加载后重新安排计时 =====
document.querySelectorAll('video').forEach(v => {
  v.addEventListener('loadedmetadata', () => {
    // 如果当前正好在这个视频页，重新安排计时
    const slide = v.closest('.slide');
    const idx = Array.from(slides).indexOf(slide);
    if (idx === current && !userNavigating) {
      clearAdvanceTimer();
      timer = setTimeout(advance, v.duration * 1000 + 500);
    }
  });
});
</script>
</body>
